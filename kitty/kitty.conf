# =============================================================================
# KITTY — TERMINAL EMULATOR CONFIGURATION
# =============================================================================
# Comprehensive configuration for the Kitty terminal emulator.
# Optimized for performance, visual clarity, and developer workflow.
# =============================================================================

# =============================================================================
# FONT CONFIGURATION
# =============================================================================

font_family       CaskaydiaCove Nerd Font
bold_font         CaskaydiaCove Nerd Font Bold
italic_font       CaskaydiaCove Nerd Font Italic
bold_italic_font  CaskaydiaCove Nerd Font Bold Italic
font_size         11.0

# Font features (ligatures, etc.)
font_features      CaskaydiaCoveNerdFontMono-Regular +liga +calt
font_features      CaskaydiaCoveNerdFontMono-Bold +liga +calt
font_features      CaskaydiaCoveNerdFontMono-Italic +liga +calt

# Adjust line height for readability
modify_font cell_height +2px
modify_font cell_width 0px

# =============================================================================
# WINDOW APPEARANCE
# =============================================================================

# Window dimensions
window_padding_width  6        # Padding around terminal content
window_margin_width   0        # Margin around the window (0 = no margin)

# Background opacity
background_opacity    0.92     # Slight transparency (0.0-1.0)
dynamic_background_opacity  no  # Dynamic opacity changes

# Window decorations (title bar, etc.)
hide_window_decorations  no    # Show title bar (set to "titlebar-only" for minimal)

# Window borders
window_border_width    1.0     # Border width
draw_minimal_borders   yes     # Draw minimal borders

# =============================================================================
# COLOR SCHEME — NORD
# =============================================================================

# Default colors
foreground            #d8dee9
background            #2e3440
selection_foreground  #2e3440
selection_background  #88c0d0

# Cursor colors
cursor                #88c0d0
cursor_text_color     #2e3440

# URL color
url_color             #88c0d0

# Mark colors
mark1_foreground      #2e3440
mark1_background      #88c0d0
mark2_foreground      #2e3440
mark2_background      #a3be8c
mark3_foreground      #2e3440
mark3_background      #ebcb8b

# =============================================================================
# ANSI COLORS — NORD PALETTE
# =============================================================================

# Black (nord1)
color0  #3b4252
color8  #4c566a

# Red (nord11)
color1  #bf616a
color9  #bf616a

# Green (nord14)
color2  #a3be8c
color10 #a3be8c

# Yellow (nord13)
color3  #ebcb8b
color11 #ebcb8b

# Blue (nord10)
color4  #81a1c1
color12 #81a1c1

# Magenta (nord15)
color5  #b48ead
color13 #b48ead

# Cyan (nord8)
color6  #88c0d0
color14 #8fbcbb

# White (nord4)
color7  #d8dee9
color15 #eceff4

# =============================================================================
# CURSOR CONFIGURATION
# =============================================================================

cursor_shape          beam        # block, beam, underline
cursor_beam_thickness 1.5         # Beam cursor width
cursor_blink_interval 0           # 0 = no blink, positive = blink interval (sec)
cursor_stop_blinking_after 5.0    # Stop blinking after N seconds of inactivity

# Mouse cursor customization
mouse_hide_wait       2.0         # Hide mouse cursor after N seconds of idle
mouse_shape           beam        # Cursor shape: arrow, beam, underline

# =============================================================================
# SCROLLBACK
# =============================================================================

scrollback_lines      100000      # Essentially unlimited scrollback
scrollback_pager      less --chop-long-lines --RAW-CONTROL-CHARS  # Pager for scrollback
scrollback_fill_enlarged_window  yes  # Fill enlarged window with scrollback content

# =============================================================================
# TAB BAR
# =============================================================================

tab_bar_style         powerline       # Style: hidden, powerline, slanted, or custom
tab_bar_edge          bottom          # Position: top or bottom
tab_bar_margin_width  4.0             # Horizontal margin
tab_bar_margin_height 0.0 0.0         # Vertical margins

tab_separator         " ┇ "           # Separator between tabs
tab_active_foreground #2e3440
tab_active_background #88c0d0
tab_inactive_foreground #d8dee9
tab_inactive_background #3b4252

# Active tab font style
active_tab_foreground   #2e3440
active_tab_background   #88c0d0
active_tab_font_style   bold-italic
inactive_tab_foreground #d8dee9
inactive_tab_background #3b4252
inactive_tab_font_style normal

# =============================================================================
# BELL & NOTIFICATIONS
# =============================================================================

enable_audio_bell    no              # Disable the terminal bell sound
visual_bell_duration 0.0             # Duration of visual bell flash
bell_on_tab          "🔔"            # Text shown on tab when bell occurs
notify_on_cmd_finish no              # Notify when long-running commands finish

# =============================================================================
# KEYBOARD SHORTCUTS
# =============================================================================

# Font size
map ctrl+plus         change_font_size all +1.0
map ctrl+minus        change_font_size all -1.0
map ctrl+0            change_font_size all 0

# Scrolling
map ctrl+shift+up     scroll_line_up
map ctrl+shift+down   scroll_line_down
map ctrl+shift+page_up   scroll_page_up
map ctrl+shift+page_down scroll_page_down
map ctrl+shift+home   scroll_home
map ctrl+shift+end    scroll_end
map ctrl+shift+h      show_scrollback

# Tab management
map ctrl+shift+t      new_tab
map ctrl+shift+q      close_tab
map ctrl+shift+right  next_tab
map ctrl+shift+left   previous_tab
map ctrl+shift+l      next_layout
map ctrl+shift+1      goto_tab 1
map ctrl+shift+2      goto_tab 2
map ctrl+shift+3      goto_tab 3
map ctrl+shift+4      goto_tab 4
map ctrl+shift+5      goto_tab 5
map ctrl+shift+6      goto_tab 6
map ctrl+shift+7      goto_tab 7
map ctrl+shift+8      goto_tab 8
map ctrl+shift+9      goto_tab 9
map ctrl+shift+0      goto_tab 10

# Windows / panes
map ctrl+shift+enter  new_window
map ctrl+shift+w      close_window
map ctrl+shift+alt+right  next_window
map ctrl+shift+alt+left   previous_window
map ctrl+shift+left  move_window_left
map ctrl+shift+right move_window_right
map ctrl+shift+up    move_window_up
map ctrl+shift+down  move_window_down

# Layouts
map ctrl+shift+f1    next_layout
map ctrl+shift+f2    previous_layout

# Copy/paste
map ctrl+shift+c     copy_to_clipboard
map ctrl+shift+v     paste_from_clipboard
map ctrl+shift+s     paste_from_selection

# Miscellaneous
map ctrl+shift+r     reload_tt_fonts
map ctrl+shift+u     kitten unicode_input
map ctrl+shift+e     open_url
map ctrl+shift+o    toggle_layout_stack
map ctrl+shift+z    toggle_fullscreen
map ctrl+shift+m    show_kitty_docs
map ctrl+shift+escape  kitty_shell window

# =============================================================================
# PERFORMANCE SETTINGS
# =============================================================================

# Rendering
sync_to_monitor       no              # Disable vsync for lower latency
repaint_delay         10              # Milliseconds between repaints
input_delay           1               # Input latency

# Buffer control
clear_all_shortcuts   no
no_clear_after_cat    no              # Clear screen after commands
wheel_scroll_multiplier 5.0           # Scroll speed multiplier
wheel_scroll_min_lines 1

# =============================================================================
# SHELL INTEGRATION
# =============================================================================

# Shell integration improves prompt, cursor shape, and more
shell_integration     enabled         # Enable shell integration (zsh, bash, fish)
allow_remote_control  yes             # Allow programs to control kitty
listen_on             unix:/tmp/kitty  # Unix socket for remote control

# Environment variables passed to child processes
env                   TERM=xterm-kitty
env                   COLORTERM=truecolor

# =============================================================================
# KITTEN CONFIGURATION
# =============================================================================

# Diff kitten
diff_context          3
diff_tab_width        4

# =============================================================================
# ADVANCED SETTINGS
# =============================================================================

# Transparency
dynamic_background_opacity no

# Clipboard
copy_on_select        no              # Copy to clipboard on selection
paste_actions         paste_selection   # Actions on paste

# URL handling
open_url_with         xdg-open
url_style             curly           # Style: none, single, double, curly

# Mouse
click_interval        -1.0            # -1 = use system default
focus_follows_mouse   no              # Don't focus on mouse hover

# =============================================================================
# NORD COLOR THEME OVERRIDE
# =============================================================================

# Include the theme file if it exists (for theme switching support)
# This allows theme.sh to override colors dynamically
include nord.conf
