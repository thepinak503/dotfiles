# =============================================================================
# Kitty Terminal — Nord Minimal
# =============================================================================

font_family      CaskaydiaCove Nerd Font Mono
bold_font         CaskaydiaCove Nerd Font Mono Bold
italic_font       CaskaydiaCove Nerd Font Mono Italic
bold_italic_font  CaskaydiaCove Nerd Font Mono Bold Italic
font_size 11.0

# Layout
window_padding_width 8
hide_window_decorations titlebar-only
remember_window_size no
initial_window_width 900
initial_window_height 500
confirm_os_window_close 0

# Transparency
background_opacity 0.85
dynamic_background_opacity yes

# Scrollback
scrollback_lines -1
scrollback_pager_history_size 100

# Cursor
cursor_shape block
cursor_blink_interval -1
cursor_stop_blinking_after 15.0
cursor_trail 1
cursor_trail_decay 0.08 0.25
cursor_trail_start_threshold 0
cursor_trail_color #88c0d0

# Mouse
mouse_hide_wait 2.0
url_color #81a1c1
url_style curly
detect_urls yes
open_url_with firefox
copy_on_select yes

# Performance
input_delay 1
sync_to_monitor no
repaint_delay 4
background_blur 4

# Tabs
tab_bar_style powerline
tab_bar_margin_width 6
tab_bar_margin_height 0 4
tab_bar_edge top
tab_bar_min_tabs 2
tab_separator ""
active_tab_foreground   #eceff4
active_tab_background   #434c5e
inactive_tab_foreground #4c566a
inactive_tab_background #2e3440
tab_bar_background      #2e3440

# Bell
bell_on_tab no
visual_bell_duration 0.5
enable_audio_bell no
window_alert_on_bell yes

# Shell
shell .
allow_remote_control yes
listen_on unix:/tmp/kitty
term xterm-kitty

# Nord theme
include ./nord.conf
