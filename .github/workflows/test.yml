# Shell syntax + shellcheck — runs on every push/PR to main
name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  shellcheck:
    name: Shell syntax & shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq bash zsh fish shellcheck

      - name: bash -n — all .sh and .bash files
        run: |
          find . -name '*.sh' -o -name '*.bash' | grep -v '.git/' | while read -r f; do
            bash -n "$f" && echo "✓ $f" || { echo "✗ $f"; exit 1; }
          done

      - name: zsh -n — all .zsh files
        run: |
          find . -name '*.zsh' | grep -v '.git/' | while read -r f; do
            zsh -n "$f" && echo "✓ $f" || { echo "✗ $f"; exit 1; }
          done

      - name: fish -n — all .fish files
        run: |
          find . -name '*.fish' | grep -v '.git/' | while read -r f; do
            fish --no-execute "$f" && echo "✓ $f" || { echo "✗ $f"; exit 1; }
          done

      - name: shellcheck — all .sh scripts
        run: |
          shellcheck -s bash -e SC1090,SC1091,SC2034,SC2086 \
            $(find . -name '*.sh' | grep -v '.git/') || true

      - name: shellcheck — core/ POSIX
        run: |
          shellcheck -s sh -e SC1090,SC1091,SC2034 \
            core/aliases.sh core/universal.sh core/functions.sh || true

      - name: Run test suite
        run: |
          [ -f bin/test_repo.sh ]    && bash bin/test_repo.sh    || echo "ℹ bin/test_repo.sh not found"
          [ -f tests/run_tests.sh ]  && bash tests/run_tests.sh  || echo "ℹ tests/run_tests.sh not found"
