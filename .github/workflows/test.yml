# Shell syntax + shellcheck — runs on every push/PR to main
name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  shellcheck:
    name: Shell syntax & shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq bash zsh fish shellcheck

      - name: bash -n — all .sh and .bash files
        run: |
          find . -name '*.sh' -o -name '*.bash' | grep -v '.git/' | while read -r f; do
            bash -n "$f" && echo "✓ $f" || { echo "✗ $f"; exit 1; }
          done

      - name: zsh -n — all .zsh files
        run: |
          find . -name '*.zsh' | grep -v '.git/' | while read -r f; do
            zsh -n "$f" && echo "✓ $f" || { echo "✗ $f"; exit 1; }
          done

      - name: fish -n — all .fish files
        run: |
          find . -name '*.fish' | grep -v '.git/' | while read -r f; do
            fish --no-execute "$f" && echo "✓ $f" || { echo "✗ $f"; exit 1; }
          done

      - name: shellcheck — all .sh scripts
        run: |
          shellcheck -s bash -e SC1090,SC1091,SC2034,SC2086 \
            $(find . -name '*.sh' | grep -v '.git/') || true

      - name: shellcheck — core/ POSIX
        run: |
          shellcheck -s sh -e SC1090,SC1091,SC2034 \
            core/*.sh || true

      - name: shellcheck — bin/ scripts
        run: |
          shellcheck -s bash -e SC1090,SC1091,SC2034,SC2086 \
            bin/*.sh tests/*.sh || true

      - name: Cross-shell alias parity check
        run: |
          echo "=== Alias names ==="
          bash -c "source shells/bash/aliases.bash 2>/dev/null; alias" | cut -d= -f1 | sort > /tmp/bash_aliases.txt
          zsh -c "source shells/zsh/aliases.zsh 2>/dev/null; alias" | cut -d= -f1 | sort > /tmp/zsh_aliases.txt 2>/dev/null || touch /tmp/zsh_aliases.txt
          fish --no-execute -c "source shells/fish/aliases.fish 2>/dev/null; alias" 2>/dev/null | cut -d= -f1 | sort > /tmp/fish_aliases.txt || touch /tmp/fish_aliases.txt
          echo "Bash: $(wc -l < /tmp/bash_aliases.txt) | Zsh: $(wc -l < /tmp/zsh_aliases.txt) | Fish: $(wc -l < /tmp/fish_aliases.txt)"
          diff /tmp/bash_aliases.txt /tmp/zsh_aliases.txt 2>/dev/null | head -20 && echo "bash/zsh parity OK" || echo "bash/zsh minor diff (may be expected)"

      - name: Run test suite
        run: |
          [ -f bin/test_repo.sh ]    && bash bin/test_repo.sh    || echo "ℹ bin/test_repo.sh not found"
          [ -f tests/run_tests.sh ]  && bash tests/run_tests.sh  || echo "ℹ tests/run_tests.sh not found"
