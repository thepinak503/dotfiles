"$schema" = 'https://starship.rs/config-schema.json'
format = """
[](nord_polar_night_2)\
$os${custom.root}${custom.user}\
[](bg:nord_polar_night_1 fg:nord_polar_night_2)\
$directory\
[](bg:nord_polar_night_2 fg:nord_polar_night_1)\
($git_branch$git_commit$git_state$git_metrics$git_status$hg_branch$hg_state$fossil_branch$vcsh$pijul_channel)\
[](bg:nord_polar_night_1 fg:nord_polar_night_2)\
($package$c$cmake$cobol$daml$dart$deno$dotnet$elixir$elm$erlang$fennel$golang$gradle$guix_shell$haskell$haxe$helm$java$julia$kotlin$lua$nim$nodejs$ocaml$opa$perl$php$pulumi$pure$python$raku$rlang$red$ruby$rust$scala$solidity$swift$terraform$typst$vlang$vagrant$zig$buf$nix_shell$conda$solana$meson$spack$crystal)\
[](bg:nord_polar_night_2 fg:nord_polar_night_1)\
($docker_context$kubernetes$aws$gcloud$openstack$azure$direnv$mise$env_var$singularity$container$netns)\
[](bg:nord_polar_night_3 fg:nord_polar_night_2)\
(${custom.cpu_load}${custom.shell_mem}${custom.disk_free}${custom.uptime}$sudo$shlvl$memory_usage$localip$shell$time$battery)\
[](nord_polar_night_3)\
$line_break\
$character"""
right_format = """$cmd_duration$jobs"""
add_newline = true
palette = "nord"
command_timeout = 5000
[palettes.nord]
nord_polar_night_0 = "#2e3440"
nord_polar_night_1 = "#3b4252"
nord_polar_night_2 = "#434c5e"
nord_polar_night_3 = "#4c566a"
nord_snow_storm_0 = "#d8dee9"
nord_snow_storm_1 = "#e5e9f0"
nord_snow_storm_2 = "#eceff4"
nord_frost_mint = "#8fbcbb"
nord_frost_blue = "#88c0d0"
nord_frost_arctic = "#81a1c1"
nord_frost_deep = "#5e81ac"
nord_aurora_red = "#bf616a"
nord_aurora_orange = "#d08770"
nord_aurora_yellow = "#ebcb8b"
nord_aurora_green = "#a3be8c"
nord_aurora_purple = "#b48ead"
[os]
disabled = false
style = "bg:nord_polar_night_2 fg:nord_snow_storm_2"
[os.symbols]
Arch = "󰣇 "
Ubuntu = "󰕈 "
Fedora = "󰣛 "
Debian = "󰣚 "
Linux = "󰌽 "
Macos = " "
[custom.root]
command = "echo ' ROOT! '"
when = "test $(id -u) -eq 0"
style = "bg:nord_polar_night_2 fg:nord_aurora_red bold"
format = "[$output]($style)"
[custom.user]
command = "echo \"You are $USER\""
when = "test $(id -u) -ne 0"
style = "bg:nord_polar_night_2 fg:nord_snow_storm_2"
format = "[ 😎 $output ]($style)"
[directory]
style = "bg:nord_polar_night_1 fg:nord_aurora_orange bold"
format = "[ $path ]($style)"
truncation_length = 0
truncate_to_repo = false
[directory.substitutions]
"Documents" = "󰈙 "
"Downloads" = "󰇚 "
"Music" = "󰎄 "
"Pictures" = "󰉏 "
"Videos" = "󰕧 "
"Projects" = "󱂵 "
"work" = "󰑴 "
"src" = " "
"lib" = "󰆧 "
"test" = "🧪 "
"bin" = "󰲒 "
"include" = "󰅴 "
"venv" = "🐍 "
".git" = "󰊢 "
"node_modules" = " "
"target" = "🎯 "
"build" = "🏗️ "
"dist" = "📦 "
"public" = "🌐 "
"private" = "🔒 "
"config" = "⚙️ "
"scripts" = "📜 "
"data" = "📊 "
"assets" = "🎨 "
"docs" = "📚 "
"tests" = "🧪 "
"tools" = "🛠️ "
"internal" = "🔒 "
"pkg" = "📦 "
"cmd" = "󰘳 "
"api" = "🔌 "
"web" = "🕸️ "
[git_branch]
symbol = ""
style = "bg:nord_polar_night_2 fg:nord_aurora_green"
format = "[ $symbol $branch ]($style)"
[git_status]
style = "bg:nord_polar_night_2 fg:nord_aurora_red"
format = "[($all_status$ahead_behind )]($style)"
conflicted = "="
ahead = "⇡"
behind = "⇣"
diverged = "⇕"
untracked = "?"
stashed = "$"
modified = "!"
staged = "+"
renamed = "»"
deleted = "✘"
[git_state]
style = "bg:nord_polar_night_2 fg:nord_aurora_yellow"
format = "[ \\($state( $progress_current/$progress_total)\\) ]($style)"
[git_commit]
commit_hash_length = 7
style = "bg:nord_polar_night_2 fg:nord_snow_storm_0"
format = "[ @$hash ]($style)"
[package]
symbol = "󰏗 "
style = "bg:nord_polar_night_1 fg:nord_snow_storm_0"
format = "[ via $symbol$version ]($style)"
[python]
symbol = " "
style = "bg:nord_polar_night_1 fg:nord_aurora_yellow"
format = "[ via $symbol$version ]($style)"
[nodejs]
symbol = " "
style = "bg:nord_polar_night_1 fg:nord_aurora_green"
format = "[ via $symbol$version ]($style)"
[rust]
symbol = " "
style = "bg:nord_polar_night_1 fg:nord_aurora_orange"
format = "[ via $symbol$version ]($style)"
[golang]
symbol = " "
style = "bg:nord_polar_night_1 fg:nord_frost_mint"
format = "[ via $symbol$version ]($style)"
[docker_context]
symbol = " "
style = "bg:nord_polar_night_2 fg:nord_frost_blue"
format = "[ via $symbol$context ]($style)"
[kubernetes]
symbol = "󱃾 "
style = "bg:nord_polar_night_2 fg:nord_aurora_purple"
format = "[ via $symbol$context ]($style)"
[direnv]
symbol = "󰉓 "
style = "bg:nord_polar_night_2 fg:nord_aurora_yellow"
format = "[ $symbol$allowed ]($style)"
[mise]
symbol = "󱗼 "
style = "bg:nord_polar_night_2 fg:nord_frost_blue"
format = "[ via $symbol$version ]($style)"
[custom.cpu_load]
command = "top -bn1 | grep 'Cpu(s)' | awk '{print $2}'"
when = "test $(uname) = Linux"
style = "bg:nord_polar_night_3 fg:nord_aurora_orange"
format = "[ 󰻠 $output% ]($style)"
disabled = false
[custom.shell_mem]
command = "free -h | awk '/^Mem:/ {print $3 \"/\" $2}'"
when = "test $(uname) = Linux"
style = "bg:nord_polar_night_3 fg:nord_frost_arctic"
format = "[ 󰍛 $output ]($style)"
disabled = false
[custom.disk_free]
command = "df -h / | awk 'NR==2 {print $4}'"
when = "true"
style = "bg:nord_polar_night_3 fg:nord_frost_blue"
format = "[ 󰋊 $output ]($style)"
disabled = false
[custom.uptime]
command = "uptime -p | sed 's/up //'"
when = "true"
style = "bg:nord_polar_night_3 fg:nord_snow_storm_0"
format = "[ 󰅐 $output ]($style)"
disabled = false
[shell]
fish_indicator = "󰈺 fish"
bash_indicator = " bash"
zsh_indicator = "󱆃 zsh"
style = "bg:nord_polar_night_3 fg:nord_snow_storm_0"
format = "[ via $indicator ]($style)"
disabled = false
[time]
disabled = false
time_format = "%l:%M:%S %p"
use_12hr = true
style = "bg:nord_polar_night_3 fg:nord_snow_storm_2"
format = '[  $time ]($style)'
[battery]
full_symbol = "󰁹 "
charging_symbol = "󰂄 "
discharging_symbol = "󰂃 "
format = '[ $symbol$percentage ](bg:nord_polar_night_3 fg:nord_snow_storm_2)'
disabled = false
[character]
success_symbol = "[❯](bold nord_aurora_green)"
error_symbol = "[❯](bold nord_aurora_red)"
[cmd_duration]
min_time = 500
format = "took [$duration]($style) "
style = "bold nord_aurora_yellow"
[sudo]
symbol = "󰰓 "
style = "bg:nord_polar_night_3 fg:nord_aurora_red"
format = "[ $symbol]($style)"
disabled = false
