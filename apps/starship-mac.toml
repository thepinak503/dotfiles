# World-class fancy prompt with root warning
[git_status]
format = 'on [($all_status)$repository_name]($style) '

[custom.root_warning]
command = "printf '⚠️ ROOT WARNING: You are running as root. Do not execute destructive commands (rm -rf, dd, >, etc.) without double-checking.'"
when = "test \"$(id -u)\" -eq 0"
style = "bold red"
format = "[$output]"