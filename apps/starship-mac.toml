right_format = """$cmd_duration$shell$jobs"""

add_newline = true

[shell]
style = "fg:#6c7086"
format = '[$symbol$version]($style) '
disabled = false

[jobs]
style = "fg:#6c7086"
format = '[$number]($style) '

[directory]
style = "fg:#e3e5e5 bg:#769ff0"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "вА¶/"

[directory.substitutions]
