"$schema" = 'https://starship.rs/config-schema.json'
format = """[ÓÇ∂](nord_polar_night_2)$os$hostname${custom.root}${custom.user}[ÓÇ∞](bg:nord_polar_night_1 fg:nord_polar_night_2)$directory[ÓÇ∞](bg:nord_polar_night_2 fg:nord_polar_night_1)($git_branch$git_commit$git_state$git_metrics$git_status$hg_branch$hg_state$fossil_branch$vcsh$pijul_channel)[ÓÇ∞](bg:nord_polar_night_1 fg:nord_polar_night_2)($package$c$cmake$cobol$daml$dart$deno$dotnet$elixir$elm$erlang$fennel$golang$gradle$guix_shell$haskell$haxe$helm$java$julia$kotlin$lua$nim$nodejs$ocaml$opa$perl$php$pulumi$purescript$python$raku$rlang$ruby$rust$scala$solidity$swift$terraform$typst$vlang$vagrant$zig$buf$nix_shell$conda$solana$meson$spack$crystal)[ÓÇ∞](bg:nord_polar_night_2 fg:nord_polar_night_1)($docker_context$kubernetes$aws$gcloud$openstack$azure$direnv$mise$env_var$singularity$container$netns)[ÓÇ∞](bg:nord_polar_night_3 fg:nord_polar_night_2)(${custom.cpu_load}${custom.shell_mem}${custom.disk_free}${custom.uptime}$sudo$shlvl$memory_usage$localip$shell$time$battery)[ÓÇ¥](nord_polar_night_3)$line_break$character"""
right_format = """$cmd_duration$jobs"""
add_newline = true
palette = "nord"

[palettes.nord]
nord_polar_night_0 = "#2E3440"
nord_polar_night_1 = "#3B4252"
nord_polar_night_2 = "#434C5E"
nord_polar_night_3 = "#4C566A"
nord_snow_storm_0 = "#D8DEE9"
nord_snow_storm_1 = "#E5E9F0"
nord_snow_storm_2 = "#ECEFF4"
nord_frost_cyan = "#8FBCBB"
nord_frost_blue = "#88C0D0"
nord_frost_arctic = "#81A1C1"
nord_frost_deep = "#5E81AC"
nord_aurora_red = "#BF616A"
nord_aurora_orange = "#D08770"
nord_aurora_yellow = "#EBCB8B"
nord_aurora_green = "#A3BE8C"
nord_aurora_purple = "#B48EAD"

[character]
success_symbol = "[Û∞Ñ¨ ](bold nord_aurora_green)"
error_symbol = "[Û∞Öô ](bold nord_aurora_red)"
vicmd_symbol = "[Û∞ò≥ ](bold nord_frost_blue)"

[os]
disabled = false
style = "bg:nord_polar_night_2 fg:nord_snow_storm_2"
format = "[$symbol]($style)"

[os.symbols]
Macos = "Ô£ø "

[directory]
style = "bg:nord_polar_night_1 fg:nord_frost_arctic"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "‚Ä¶/"
read_only = " Û∞åæ"
home_symbol = "Û±Çµ "

[hostname]
ssh_only = false
format = "[$ssh_symbol$hostname]($style) "
style = "bg:nord_polar_night_2 fg:nord_aurora_yellow"
ssh_symbol = "Û∞£Ä "

[git_branch]
symbol = "Ôêò "
style = "bg:nord_polar_night_2 fg:nord_aurora_purple"
format = "[$symbol$branch]($style)"

[git_status]
style = "bg:nord_polar_night_2 fg:nord_aurora_red"
format = "[$all_status$ahead_behind]($style)"

[custom.cpu_load]
command = "cut -d' ' -f1 /proc/loadavg"
style = "bg:nord_polar_night_3 fg:nord_aurora_yellow"
format = "[ Û∞ªÝ $output ]($style)"
os = "linux"

[custom.shell_mem]
command = "ps -o rss= -p $$ | awk '{printf \"%.1fMi\", $1/1024}'"
style = "bg:nord_polar_night_3 fg:nord_frost_blue"
format = "[ Û∞çõ $output ]($style)"

[battery]
full_symbol = "Û∞Åπ "
charging_symbol = "Û∞ÇÑ "
discharging_symbol = "Û∞ÇÉ "
format = "[ $symbol$percentage ]($style)"

