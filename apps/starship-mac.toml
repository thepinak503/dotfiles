"$schema" = 'https://starship.rs/config-schema.json'

# The core format string
format = """
[­¤”ģ ](bold yellow)\
${custom.root}\
$directory \
$git_branch\
$git_status\
$package\
$c$cmake$cobol$daml$dart$deno$dotnet$elixir$elm$erlang$fennel$golang$gradle$haskell$haxe$helm$java$julia$kotlin$lua$nim$nodejs$ocaml$perl$php$pulumi$python$raku$rlang$ruby$rust$scala$swift$terraform$zig\
${custom.cpu}\
$memory_usage\
${custom.disk}\
${custom.uptime}\
$shell\
$time\
$line_break\
$character"""

right_format = """$cmd_duration$jobs"""

add_newline = true
palette = "nord"

[palettes.nord]
nord_polar_night_0 = "#2E3440"
nord_polar_night_1 = "#3B4252"
nord_polar_night_2 = "#434C5E"
nord_polar_night_3 = "#4C566A"
nord_snow_storm_0 = "#D8DEE9"
nord_snow_storm_1 = "#E5E9F0"
nord_snow_storm_2 = "#ECEFF4"
nord_frost_cyan = "#8FBCBB"
nord_frost_blue = "#88C0D0"
nord_frost_arctic = "#81A1C1"
nord_frost_deep = "#5E81AC"
nord_aurora_red = "#BF616A"
nord_aurora_orange = "#D08770"
nord_aurora_yellow = "#EBCB8B"
nord_aurora_green = "#A3BE8C"
nord_aurora_purple = "#B48EAD"

[character]
success_symbol = "[ŌØ»](bold nord_aurora_green)"
error_symbol = "[ŌØ»](bold nord_aurora_red)"
vicmd_symbol = "[ŌØ«](bold nord_frost_blue)"

[directory]
style = "bold nord_frost_arctic"
format = "[$path]($style) "
truncation_length = 0
home_symbol = "~"

[git_branch]
symbol = "’Éś "
style = "bold nord_aurora_purple"
format = "on [$symbol$branch]($style) "

[git_status]
style = "bold nord_aurora_red"
format = "([\\[$all_status$ahead_behind\\]]($style) )"

[memory_usage]
disabled = false
format = "[$mem_used/$total]($style) "
threshold = 0
style = "bold nord_frost_blue"

[shell]
disabled = false
format = "via [$common_name]($style) "
style = "bold nord_aurora_purple"

[time]
disabled = false
format = "[$time]($style)"
time_format = "%r"
style = "bold nord_aurora_yellow"

# Custom Modules for the "Ultimate" experience
[custom.root]
command = "if [ \"$(id -u)\" -eq 0 ]; then echo 'ROOT! '; fi"
style = "bold nord_aurora_red"
format = "[$output]($style)"
when = true

[custom.cpu]
command = "top -l 1 | grep 'CPU usage' | awk '{print $3}'"
style = "bold nord_aurora_orange"
format = "[$output ]($style)"
os = "macos"

[custom.disk]
command = "df -h / | awk 'NR==2 {print $4}'"
style = "bold nord_frost_cyan"
format = "[$output ]($style)"

[custom.uptime]
command = "uptime | sed 's/.*up //' | sed 's/, [0-9]* user.*//'"
style = "bold nord_aurora_green"
format = "[$output   ]($style)"
os = "macos"

# Language specific modules with "via" and icons
[python]
symbol = "ŅłĄ "
format = "via [${symbol}${version}]($style) "
style = "bold nord_aurora_yellow"

[rust]
symbol = "Ņ×© "
format = "via [${symbol}${version}]($style) "
style = "bold nord_aurora_orange"

[nodejs]
symbol = "Ņ£ś "
format = "via [${symbol}${version}]($style) "
style = "bold nord_aurora_green"

[golang]
symbol = "Ņś¦ "
format = "via [${symbol}${version}]($style) "
style = "bold nord_frost_blue"

[c]
symbol = "Ņś× "
format = "via [${symbol}${version}]($style) "
style = "bold nord_frost_blue"

[lua]
symbol = "ŅśĀ "
format = "via [${symbol}${version}]($style) "
style = "bold nord_frost_blue"

[java]
symbol = "Ņē¢ "
format = "via [${symbol}${version}]($style) "
style = "bold nord_aurora_red"

[php]
symbol = "¾░ī¤ "
format = "via [${symbol}${version}]($style) "
style = "bold nord_aurora_purple"

[ruby]
symbol = "ŅłŠ "
format = "via [${symbol}${version}]($style) "
style = "bold nord_aurora_red"

[haskell]
symbol = "ŅØĘ "
format = "via [${symbol}${version}]($style) "
style = "bold nord_aurora_purple"

# Disable some things to keep it clean but functional
[cmd_duration]
min_time = 500
format = "took [$duration]($style)"
style = "bold nord_aurora_yellow"
