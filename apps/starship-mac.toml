sandbox = 'sand'

[azure]
symbol = "󰠅 "
style = "bg:#212736"
format = '[[ $symbol($subscription) ](fg:#769ff0 bg:#212736)]($style)'
disabled = false

[gcloud]
symbol = " "
style = "bg:#212736"
format = '[[ $symbol($project)\(($region)\) ](fg:#769ff0 bg:#212736)]($style)'
disabled = false

[gcloud.region_aliases]
us-central1 = 'usc1'
europe-west1 = 'ew1'
asia-east1 = 'ae1'

[openstack]
symbol = "☁"
style = "bg:#212736"
format = '[[ $symbol($cloud)\(($project)\) ](fg:#769ff0 bg:#212736)]($style)'
disabled = false

[docker_context]
symbol = " "
style = "bg:#212736"
format = '[[ $symbol($context) ](fg:#769ff0 bg:#212736)]($style)'
only_with_files = true
detect_extensions = []
detect_files = ['docker-compose.yml', 'docker-compose.yaml', 'Dockerfile']
detect_folders = []

[kubernetes]
symbol = "󰉙 "
style = "bg:#212736"
format = '[[ $symbol($context)\(($namespace)\) ](fg:#769ff0 bg:#212736)]($style)'
disabled = false
detect_extensions = []
detect_files = []
detect_folders = []
context_aliases = {}
user_aliases = {}

[container]
symbol = "⬢"
style = "bold red dimmed"
format = '[$symbol \\[$name\\] ]($style)'
disabled = false

[singularity]
symbol = "S"
style = "bg:#212736"
format = '[[ $symbol($env) ](fg:#769ff0 bg:#212736)]($style)'
disabled = false
detect_env_vars = ['SINGULARITY_NAME', 'SINGULARITY_CONTAINER']

[nats]
symbol = "N"
style = "bg:#212736"
format = '[[ $symbol($ctx) ](fg:#769ff0 bg:#212736)]($style)'
disabled = false

[pulumi]
symbol = ""
style = "bg:#212736"
format = '[[ $symbol($version)\($stack\) ](fg:#769ff0 bg:#212736)]($style)'

[terraform]
symbol = ""
style = "bg:#212736"
format = '[[ $symbol($version) ](fg:#769ff0 bg:#212736)]($style)'
detect_extensions = ['tf', 'tfvars']
detect_files = []
detect_folders = ['.terraform']

[opa]
symbol = "🅾"
style = "bg:#212736"
format = '[[ $symbol($version) ](fg:#769ff0 bg:#212736)]($style)'
detect_extensions = ['rego']
detect_files = ['.opa']
detect_folders = []

[quarto]
symbol = ""
style = "bg:#212736"
format = '[[ $symbol($version) ](fg:#769ff0 bg:#212736)]($style)'
detect_extensions = ['qmd']
detect_files = ['_quarto.yml']
detect_folders = []

# ─────────────────────────────────────────────────────────────────────────────────
#  SECTION 10: ENVIRONMENT & SYSTEM
# ─────────────────────────────────────────────────────────────────────────────────

[direnv]
symbol = ""
style = "bg:#212736"
format = '[[ $symbol\($loaded\) ](fg:#769ff0 bg:#212736)]($style)'
disabled = false
allowed_msg = '✓'
denied_msg = '✗'
loaded_msg = 'L'
unloaded_msg = 'U'

[env_var]
symbol = ""
style = "bg:#212736"
format = '[[ $env_value ](fg:#a0a9cb bg:#212736)]($style)'
disabled = true

[memory_usage]
symbol = " "
style = "bg:#212736"
format = '[[ $symbol($ram_used) ](fg:#a0a9cb bg:#212736)]($style)'
disabled = false
threshold = 75

[os]
disabled = true
style = "bg:#212736"
format = '[[ $symbol]($style) ]'
symbols = {
  Arch = "  ",
  Debian = "  ",
  Fedora = "  ",
  NixOS = "  ",
  Ubuntu = "  ",
  Macos = "  ",
  Windows = "  ",
  Alpine = "  ",
  CentOS = "  ",
  Manjaro = "  ",
  Mint = "  ",
  RedHat = "  ",
  SUSE = "  ",
  Void = "  ",
}

# ─────────────────────────────────────────────────────────────────────────────────
#  SECTION 11: TIME · BATTERY · DURATION · STATUS · JOBS
# ─────────────────────────────────────────────────────────────────────────────────

[time]
disabled = false
time_format = "%a %d %b %H:%M:%S"
style = "bg:#1d2230"
format = '[[  $time ](fg:#a0a9cb bg:#1d2230)]($style)'
utc_time_offset = "local"

[battery]
format = '[[ $symbol$percentage ](fg:#a0a9cb bg:#1d2230)]($style)'
full_symbol = '🔋 '
charging_symbol = '⚡ '
discharging_symbol = '🔋 '
unknown_symbol = '🔋 '
empty_symbol = '🔋 '
disabled = false

[[battery.display]]
threshold = 10
style = 'bold red fg:#ff6b6b bg:#1d2230'
discharging_symbol = '🪫 '

[[battery.display]]
threshold = 20
style = 'bold red fg:#a0a9cb bg:#1d2230'

[[battery.display]]
threshold = 30
style = 'bold yellow fg:#a0a9cb bg:#1d2230'

[[battery.display]]
threshold = 50
style = 'bold yellow fg:#a0a9cb bg:#1d2230'

[[battery.display]]
threshold = 70
style = 'bold green fg:#a0a9cb bg:#1d2230'

[[battery.display]]
threshold = 90
style = 'bold green fg:#a0a9cb bg:#1d2230'

[[battery.display]]
threshold = 100
style = 'bold green fg:#a0a9cb bg:#1d2230'

[cmd_duration]
min_time = 1
show_milliseconds = false
style = "fg:#a0a9cb"
format = '[[took $duration ](fg:#a0a9cb bg:#1d2230)]($style)'
disabled = false
show_notifications = false

[status]
disabled = false
format = '[\[$symbol$status_common_meaning$status_signal_name$status_maybe_int\]]($style)'
symbol = "🔴 "
style = "fg:#ff6b6b"
map_symbol = true
recognize_signal_code = true
pipestatus = true
pipestatus_separator = '|'
pipestatus_format = '\[$pipestatus\] => [$symbol$common_meaning$signal_name$maybe_int]($style)'

[jobs]
disabled = false
style = "fg:#6c7086"
format = '[$number]($style) '
symbol = ' '
threshold = 1

# ─────────────────────────────────────────────────────────────────────────────────
#  SECTION 12: CUSTOM MODULES
# ─────────────────────────────────────────────────────────────────────────────────
# NOTE: Only root_warning and public_ip are in the format string above.
# The others below are defined but NOT referenced in `format` — add them to
# `format` or `right_format` if you want them to appear. Alternatively,
# remove the explicit `format` string to let Starship auto-place them.

[custom.root_warning]
command = 'echo " ⚠️  YOU ARE RUNNING AS ROOT! BE CAREFUL WITH YOUR COMMANDS! "'
style = 'fg:#ff6b6b bg:#1a0a0a'
symbol = ""
format = '[$symbol$output]($style)'
when = 'test $EUID -eq 0'
description = "Warns when running as root"


# ── Inactive custom modules (not in format string — won't display as-is) ────

[custom.system_load]
command = "uptime | awk -F'load average:' '{print $2}' | cut -d, -f1 | xargs"
style = 'fg:#a0a9cb bg:#212736'
symbol = ' '
format = '[[ $symbol$output ](fg:#a0a9cb bg:#212736)]($style)'
when = 'true'
shell = 'bash'
description = "System load average"

[custom.disk_root]
command = "df -h / | awk 'NR==2{print $5}'"
style = 'fg:#a0a9cb bg:#212736'
symbol = ' '
format = '[[ $symbol$output ](fg:#a0a9cb bg:#212736)]($style)'
when = 'true'
shell = 'bash'
description = "Root disk usage"

[custom.ram_usage]
command = "free -h | awk '/^Mem:/{print $3\"/\"$2}'"
style = 'fg:#a0a9cb bg:#212736'
symbol = ' '
format = '[[ $symbol$output ](fg:#a0a9cb bg:#212736)]($style)'
when = 'true'
shell = 'bash'
description = "RAM usage"

[custom.tmux_session]
command = 'echo "$TMUX" | awk -F, "{print \$NF}" 2>/dev/null || true'
style = 'fg:#a0a9cb bg:#212736'
symbol = ' '
format = '[[ $symbol$output ](fg:#a0a9cb bg:#212736)]($style)'
when = 'test -n "$TMUX"'
shell = 'bash'
description = "Tmux session name"

[custom.kubernetes_ns]
command = 'kubectl config view --minify --output jsonpath="{..namespace}" 2>/dev/null || true'
style = 'fg:#769ff0 bg:#212736'
symbol = ' '
format = '[[ $symbol$output ](fg:#769ff0 bg:#212736)]($style)'
when = 'test -n "$(command -v kubectl)"'
shell = 'bash'
description = "Current Kubernetes namespace"

[custom.git_user]
command = 'git config user.email 2>/dev/null | sed "s/@.*/@/" || true'
style = 'fg:#a0a9cb bg:#212736'
symbol = ' '
format = '[[ $symbol$output ](fg:#a0a9cb bg:#212736)]($style)'
when = 'git rev-parse --is-inside-work-tree 2>/dev/null'
shell = 'bash'
description = "Git user email in repo"

[custom.gcloud_project]
command = 'gcloud config get-value project 2>/dev/null || true'
style = 'fg:#769ff0 bg:#212736'
symbol = ' '
format = '[[ $symbol$output ](fg:#769ff0 bg:#212736)]($style)'
when = 'test -n "$(command -v gcloud)" && test -f ~/.config/gcloud/active_config'
shell = 'bash'
description = "Current GCloud project"

[custom.weather]
command = 'curl -fsSL --max-time 2 "wttr.in?format=%c+%t" 2>/dev/null || true'
style = 'fg:#a0a9cb bg:#1d2230'
symbol = ''
format = '[[ $output ](fg:#a0a9cb bg:#1d2230)]($style)'
when = 'test "$(date +%H)" -lt "1"'
shell = 'bash'
description = "Current weather (checks hourly)"

[custom.docker_ps_count]
command = 'docker ps -q 2>/dev/null | wc -l | xargs || true'
style = 'fg:#a0a9cb bg:#212736'
symbol = ' '
format = '[[ $symbol$output\x20running ](fg:#a0a9cb bg:#212736)]($style)'
when = 'test -n "$(command -v docker)" && docker info 2>/dev/null >/dev/null'
shell = 'bash'
description = "Count of running docker containers"

[custom.uptime]
command = "uptime -p | sed 's/up //' | sed 's/ hours/:/' | sed 's/ minutes//' | xargs"
style = 'fg:#a0a9cb bg:#1d2230'
symbol = ' '
format = '[[ $symbol$output ](fg:#a0a9cb bg:#1d2230)]($style)'
when = 'true'
shell = 'bash'
description = "System uptime"

