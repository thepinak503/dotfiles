# ╔═══════════════════════════════════════════════════════════════════════════════╗
# ║  STARSHIP PROMPT — Tokyo Night (Single Line · Ultra Dynamic)                ║
# ║  All modules appear dynamically based on context/directory/files detected.   ║
# ║  https://starship.rs/config/                                                 ║
# ╚═══════════════════════════════════════════════════════════════════════════════╝

# ─── Global Settings ─────────────────────────────────────────────────────────────
"$schema" = 'https://starship.rs/config-schema.json'
palette = "tokyo_night"           # ← activate the palette defined below
command_timeout = 500
scan_timeout = 30
add_newline = true
follow_symlinks = true

# ─── Format Strings ─────────────────────────────────────────────────────────────
# Left prompt: identity → directory → git → languages/tools → cloud → time → char
format = """
${custom.root_warning}\
[░▒▓](bg:#a3aed2 fg:#090c0c)\
$username\
$hostname\
[  ](bg:#a3aed2 fg:#090c0c)\
[](bg:#769ff0 fg:#a3aed2)\
$directory\
[](fg:#769ff0 bg:#394260)\
$git_branch\
$git_status\
[](fg:#394260 bg:#212736)\
$python\
$rust\
$golang\
$nodejs\
$java\
$php\
$ruby\
$dart\
$elixir\
$elm\
$julia\
$haskell\
$nim\
$nix_shell\
$perl\
$scala\
$swift\
$c\
$cobol\
$crystal\
$daml\
$deno\
$dotnet\
$erlang\
$fennel\
$fortran\
$gleam\
$gradle\
$haxe\
$kotlin\
$lua\
$maven\
$mojo\
$ocaml\
$odin\
$opa\
$pulumi\
$purescript\
$quarto\
$raku\
$rlang\
$red\
$solidity\
$terraform\
$typst\
$vlang\
$vagrant\
$xmake\
$zig\
$buf\
$cmake\
$bun\
$package\
$conda\
$pixi\
$meson\
$spack\
$guix_shell\
$docker_context\
$kubernetes\
$aws\
$gcloud\
$azure\
$openstack\
$container\
$singularity\
$nats\
$direnv\
$env_var\
$memory_usage\
[](fg:#212736 bg:#1d2230)\
$time\
$battery\
[▓▒░](fg:#1d2230)\
[▶](fg:#1d2230)\
$character"""

# Right prompt: diagnostics & network info
right_format = """$status$shell$jobs$shlvl$localip"""

# ─────────────────────────────────────────────────────────────────────────────────
#  SECTION 1: PROMPT CHARACTER & SUDO
# ─────────────────────────────────────────────────────────────────────────────────

[character]
success_symbol = "[❯](bold green)"
error_symbol = "[✗](bold red)"
vimcmd_symbol = "[❮](bold green)"
vimcmd_replace_one_symbol = "[❮](bold purple)"
vimcmd_replace_symbol = "[❮](bold purple)"
vimcmd_visual_symbol = "[❮](bold yellow)"
format = '$symbol '

[sudo]
disabled = false
style = "fg:#ff6b6b"
format = '[$symbol]($style) '
symbol = "💀"
allow_windows = false
detect_env_vars = ['SUDO_UID', 'SUDO_USER', 'SUDO_GID', 'SUDO_COMMAND', 'SUDO_PS1']

# ─────────────────────────────────────────────────────────────────────────────────
#  SECTION 2: IDENTITY — User · Host · Shell · Level · IP
# ─────────────────────────────────────────────────────────────────────────────────

[username]
show_always = true
style_user = "bg:#a3aed2 fg:#090c0c"
style_root = "bg:#a3aed2 fg:#090c0c"
format = '[$user]($style)'

[hostname]
ssh_only = false
disabled = false
trim_at = "-"
style = "bg:#a3aed2 fg:#090c0c"
format = '[@$hostname]($style)'

[shell]
disabled = false
style = "fg:#6c7086"
format = '[$indicator]($style) '

[shlvl]
disabled = false
style = "fg:#6c7086"
format = '[$symbol$shlvl]($style) '
symbol = '↕ '
threshold = 2
repeat = false

[localip]
disabled = false
style = "fg:#6c7086"
format = '[$localipv4]($style) '
ssh_only = true

# ─────────────────────────────────────────────────────────────────────────────────
#  SECTION 3: DIRECTORY
# ─────────────────────────────────────────────────────────────────────────────────

[directory]
style = "fg:#e3e5e5 bg:#769ff0"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "…/"
truncate_to_repo = true
read_only = " "
read_only_style = "fg:#ff6b6b bg:#769ff0"
home_symbol = "~"

[directory.substitutions]
"Documents" = "󰈙 "
"Downloads" = " "
"Music" = " "
"Pictures" = " "
"Videos" = " "
"Desktop" = " "
"Templates" = " "
"Public" = " "
".config" = "⚙ "
".local" = " "
".cache" = " "
".ssh" = " "
".gnupg" = " "
"projects" = " "
"repos" = " "
"github" = " "
"gitlab" = " "
"bitbucket" = " "
"work" = "良 "
"school" = "龎 "
"docker" = " "
"kubernetes" = "󰉙 "
"aws" = " "
"gcp" = " "
"azure" = "󰠅 "
"notes" = " "
"dotfiles" = " "

# ─────────────────────────────────────────────────────────────────────────────────
#  SECTION 4: VERSION CONTROL — Git
# ─────────────────────────────────────────────────────────────────────────────────

[git_branch]
style = "bg:#394260"
format = '[[ $symbol$branch ](fg:#769ff0 bg:#394260)]($style)'
symbol = " "
truncation_length = 12
truncation_symbol = "…"
ignore_branches = ["HEAD"]

[git_commit]
disabled = false
style = "bg:#394260"
format = '[[\($hash$tag\)](fg:#a0a9cb bg:#394260)]($style)'
commit_hash_length = 7
tag_symbol = '  '

[git_state]
disabled = false
style = "bg:#394260"
format = '[[\($state( $progress_current/$progress_total)\)](fg:#ff6b6b bg:#394260)]($style)'
rebase = 'REBASE'
merge = 'MERGE'
revert = 'REVERT'
cherry_pick = 'CHERRY-PICK'
bisect = 'BISECT'
am = 'AM'
am_or_rebase = 'AM/REBASE'

[git_status]
style = "bg:#394260"
format = '[[($all_status$ahead_behind )](fg:#769ff0 bg:#394260)]($style)'
conflicted = '💥'
ahead = '⇡${count}'
behind = '⇣${count}'
diverged = '⇕⇡${ahead_count}⇣${behind_count}'
up_to_date = ' '
untracked = '?${count}'
stashed = '📦'
modified = '!${count}'
staged = '+${count}'
renamed = '→${count}'
deleted = 'x${count}'
typechanged = '~${count}'

[git_metrics]
disabled = false
format = '[[(+$added_count)(-$deleted_count) ](fg:#a0a9cb bg:#394260)]($style)'
added_style = 'bold green'
deleted_style = 'bold red'
ignore_submodules = true

# ─────────────────────────────────────────────────────────────────────────────────
#  SECTION 5: VERSION CONTROL — Other VCS (disabled by default)
# ─────────────────────────────────────────────────────────────────────────────────

[hg_branch]
disabled = true
symbol = " "
style = "bg:#394260"
format = '[[ $symbol$branch ](fg:#769ff0 bg:#394260)]($style)'
truncation_length = 12
truncation_symbol = "…"

[fossil_branch]
disabled = true
style = "bg:#394260"
format = '[[ $symbol$branch ](fg:#769ff0 bg:#394260)]($style)'
symbol = " "
truncation_length = 12
truncation_symbol = "…"

[vcsh]
disabled = true
style = "bg:#394260"
format = '[[ $symbol$repo ](fg:#769ff0 bg:#394260)]($style)'
symbol = " "

[pijul_channel]
disabled = true
style = "bg:#394260"
format = '[[ $symbol$channel ](fg:#769ff0 bg:#394260)]($style)'
symbol = " "

