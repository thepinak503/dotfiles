[netns]
symbol = "󰩟 "
style = "bg:nord_polar_night_2 fg:nord_snow_storm_0"
format = "[ via $symbol$name ]($style)"
[custom.cpu_load]
command = "top -bn1 | grep 'Cpu(s)' | awk '{print $2}'"
when = "test $(uname) = Linux"
style = "bg:nord_polar_night_3 fg:nord_aurora_orange"
format = "[ 󰻠 $output% ]($style)"
disabled = false
[custom.shell_mem]
command = "free -h | awk '/^Mem:/ {print $3 \"/\" $2}'"
when = "test $(uname) = Linux"
style = "bg:nord_polar_night_3 fg:nord_frost_arctic"
format = "[ 󰍛 $output ]($style)"
disabled = false
[custom.disk_free]
command = "df -h / | awk 'NR==2 {print $4}'"
when = "true"
style = "bg:nord_polar_night_3 fg:nord_frost_blue"
format = "[ 󰋊 $output ]($style)"
disabled = false
[custom.uptime]
command = "uptime -p | sed 's/up //'"
when = "true"
style = "bg:nord_polar_night_3 fg:nord_snow_storm_0"
format = "[ 󰅐 $output ]($style)"
disabled = false
[shell]
fish_indicator = "󰈺 fish"
bash_indicator = " bash"
zsh_indicator = "󱆃 zsh"
style = "bg:nord_polar_night_3 fg:nord_snow_storm_0"
format = "[ via $indicator ]($style)"
disabled = false
[time]
disabled = false
time_format = "%l:%M:%S %p"
use_12hr = true
style = "bg:nord_polar_night_3 fg:nord_snow_storm_2"
format = '[  $time ]($style)'
[battery]
full_symbol = "󰁹 "
charging_symbol = "󰂄 "
discharging_symbol = "󰂃 "
format = '[ $symbol$percentage ](bg:nord_polar_night_3 fg:nord_snow_storm_2)'
disabled = false
[[battery.display]]
threshold = 10
style = "bg:nord_polar_night_3 fg:nord_aurora_red"
[[battery.display]]
threshold = 30
style = "bg:nord_polar_night_3 fg:nord_aurora_yellow"
[character]
success_symbol = "[❯](bold nord_aurora_green)"
error_symbol = "[❯](bold nord_aurora_red)"
[cmd_duration]
min_time = 500
format = "took [$duration]($style) "
style = "bold nord_aurora_yellow"
[sudo]
symbol = "󰰓 "
style = "bg:nord_polar_night_3 fg:nord_aurora_red"
format = "[ $symbol]($style)"
disabled = false
[shlvl]
symbol = "↕ "
style = "bg:nord_polar_night_3 fg:nord_aurora_purple"
format = "[ $symbol$shlvl ]($style)"
disabled = false
threshold = 2
[memory_usage]
symbol = "󰍛 "
style = "bg:nord_polar_night_3 fg:nord_frost_arctic"
format = "[ $symbol$ram ]($style)"
disabled = false
threshold = 0
[localip]
ssh_only = true
style = "bg:nord_polar_night_3 fg:nord_snow_storm_0"
format = "[ 󰩟 $localip ]($style)"
disabled = false
[hg_branch]
symbol = ""
style = "bg:nord_polar_night_2 fg:nord_aurora_green"
format = "[ $symbol $branch ]($style)"
[hg_state]
style = "bg:nord_polar_night_2 fg:nord_aurora_red"
format = "[ \\($state( $progress_current/$progress_total)\\) ]($style)"
[fossil_branch]
symbol = ""
style = "bg:nord_polar_night_2 fg:nord_aurora_green"
format = "[ on $symbol $branch ]($style)"
[vcsh]
symbol = ""
style = "bg:nord_polar_night_2 fg:nord_aurora_green"
format = "[ on $symbol $repo ]($style)"
[pijul_channel]
symbol = ""
style = "bg:nord_polar_night_2 fg:nord_aurora_green"
format = "[ on $symbol $channel ]($style)"
[hostname]
ssh_only = false
style = "bold muted"
format = "[$hostname]($style) "
disabled = false
[username]
show_always = true
style_user = "bold nord_frost_arctic"
style_root = "bold nord_aurora_red"
format = "[$user]($style) "
disabled = false
[status]
disabled = false
format = '[\[$status\]]($style) '
[jobs]
symbol = "󰒋 "
style = "bold nord_aurora_yellow"
format = "[$symbol$number]($style) "
[aws.region_aliases]
us-east-1 = "va"
