"$schema" = "https://starship.rs/config-schema.json"

# ============================================================
# ULTRACONFIG: Cross-platform Starship prompt for Linux + macOS
# Optimized for aesthetics, high information density, and speed.
# ============================================================

# --------------------------
# Core prompt behavior
# --------------------------
add_newline = true
command_timeout = 1200
scan_timeout = 40
continuation_prompt = "[вҲҷ](dimmed white) "

format = """
[оӮ¶](lavender)$os$username[оӮҙ](fg:lavender bg:overlay0)$hostname$localip[оӮҙ](fg:overlay0 bg:surface0)$directory$git_branch$git_status$git_state$git_metrics[оӮҙ](fg:surface0 bg:base)$fill$cmd_duration$jobs$battery$time
$container$shell$nix_shell$kubernetes$docker_context$terraform$pulumi$aws$gcloud$azure
$c$cmake$cobol$crystal$dart$deno$dotnet$elixir$elm$erlang$fennel$gleam$golang$haskell$haxe$helm$java$julia$kotlin$lua$mojo$nim$nodejs$ocaml$opa$perl$php$purescript$python$quarto$raku$rlang$red$ruby$rust$scala$solidity$swift$typst$vagrant$vlang$zig
$buf$bun$conda$daml$gradle$meson$spack
$custom.kernel$custom.distro$custom.desktop$custom.session$custom.root$custom.cpu$custom.mem$custom.disk$custom.uptime
$line_break$character
"""

right_format = """
$status
"""

palette = "catppuccin_mocha"

