read_only_style = "bold red bg:surface0"
truncation_length = 4
truncate_to_repo = false
fish_style_pwd_dir_length = 1
use_os_path_sep = true
home_symbol = "~"
repo_root_style = "bold sky bg:surface0"
repo_root_format = "[пҗҒ $before_root_path]($before_repo_root_style)[$repo_root]($repo_root_style)[$path]($style) "

[git_branch]
symbol = "пҗҳ "
style = "bold mauve bg:surface0"
format = "[$symbol$branch(:$remote_branch) ]($style)"
truncation_length = 48
truncation_symbol = "вҖҰ"
ignore_branches = ["master", "main"]
only_attached = false
always_show_remote = false

[git_commit]
commit_hash_length = 8
only_detached = true
style = "bold peach"
format = "[пҗ— $hash$tag ]($style)"

[git_state]
style = "bold yellow bg:surface0"
format = "[($state( $progress_current/$progress_total)) ]($style)"

[git_metrics]
disabled = false
added_style = "bold green bg:surface0"
deleted_style = "bold red bg:surface0"
format = "([+$added ]($added_style))([-$deleted ]($deleted_style))"
ignore_submodules = false

[git_status]
style = "bold maroon bg:surface0"
format = "([$all_status$ahead_behind ]($style))"
conflicted = "вҡ”пёҸ "
ahead = "вҮЎ${count}"
behind = "вҮЈ${count}"
diverged = "вҮ•вҮЎ${ahead_count}вҮЈ${behind_count}"
untracked = "?${count}"
stashed = "*${count}"
modified = "!${count}"
staged = "+${count}"
renamed = "В»${count}"
deleted = "вңҳ${count}"
up_to_date = "вң“"

[cmd_duration]
