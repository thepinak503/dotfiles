# --------------------------
# Custom informational modules
# --------------------------
[custom.root]
when = "test \"$(id -u)\" -eq 0"
command = "echo ROOT"
format = "[у°һҖ $output ]($style)"
style = "bold red"
shell = ["bash", "--noprofile", "--norc"]

[custom.kernel]
when = true
command = "uname -r | cut -d- -f1"
format = "[у°’Ӣ $output ]($style)"
style = "bold overlay2"
shell = ["bash", "--noprofile", "--norc"]

[custom.distro]
when = true
command = "(source /etc/os-release 2>/dev/null && echo ${PRETTY_NAME:-$NAME}) || sw_vers -productVersion 2>/dev/null || uname -s"
format = "[у°ҢҪ $output ]($style)"
style = "bold overlay2"
shell = ["bash", "--noprofile", "--norc"]

[custom.desktop]
when = true
command = "echo ${XDG_CURRENT_DESKTOP:-${DESKTOP_SESSION:-Aqua}}"
format = "[у°§Ё $output ]($style)"
style = "bold overlay1"
shell = ["bash", "--noprofile", "--norc"]

[custom.session]
when = true
command = "echo ${XDG_SESSION_TYPE:-tty}"
format = "[у°Қ№ $output ]($style)"
style = "bold overlay1"
shell = ["bash", "--noprofile", "--norc"]

[custom.cpu]
when = true
command = "if command -v sysctl >/dev/null 2>&1; then sysctl -n machdep.cpu.brand_string 2>/dev/null | sed 's/(R)//g;s/(TM)//g' | awk '{print $1,$2,$3,$4}'; else lscpu 2>/dev/null | awk -F: '/Model name/{gsub(/^ +/,\"\",$2);print $2;exit}'; fi"
format = "[у°»  $output ]($style)"
style = "bold overlay1"
shell = ["bash", "--noprofile", "--norc"]

[custom.mem]
when = true
command = "if [ \"$(uname)\" = Darwin ]; then vm_stat | awk '/page size of/{ps=$8} /Pages active/{gsub(/\./,\"\",$3);a=$3} /Pages wired down/{gsub(/\./,\"\",$4);w=$4} /Pages occupied by compressor/{gsub(/\./,\"\",$5);c=$5} END{used=(a+w+c)*ps/1024/1024/1024; printf \"%.1fGiB\", used}'; else free -h | awk '/^Mem:/{print $3\"/\"$2}'; fi"
format = "[у°Қӣ $output ]($style)"
style = "bold overlay1"
shell = ["bash", "--noprofile", "--norc"]

[custom.disk]
when = true
command = "df -h / | awk 'NR==2{print $4 \" free\"}'"
format = "[у°ӢҠ $output ]($style)"
style = "bold overlay1"
shell = ["bash", "--noprofile", "--norc"]

[custom.uptime]
when = true
command = "if command -v uptime >/dev/null 2>&1; then uptime | sed 's/.*up *//; s/, *[0-9]* users.*//; s/, load.*//'; else echo n/a; fi"
format = "[у°…җ $output ]($style)"
style = "bold overlay2"
shell = ["bash", "--noprofile", "--norc"]

