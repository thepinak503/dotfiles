Redhat = " "
RedHatEnterprise = " "
Redox = "󰀘 "
Solus = " "
SUSE = " "
Ubuntu = " "
Unknown = " "
[custom.root]
command = "echo ' ROOT! '"
when = "test $(id -u) -eq 0"
style = "bg:nord_polar_night_2 fg:nord_aurora_red bold"
format = "[$output]($style)"
[custom.user]
command = "echo \"$USER\""
when = "true"
style = "bg:nord_polar_night_2 fg:nord_snow_storm_2"
format = "[ 😎 $output ]($style)"
[directory]
style = "bg:nord_polar_night_1 fg:nord_aurora_orange bold"
format = "[ $path ]($style)"
truncation_length = 3
truncate_to_repo = true
fish_style_pwd_dir_length = 1
[directory.substitutions]
"Documents" = "󰈙 "
"Downloads" = "󰇚 "
"Music" = "󰎄 "
"Pictures" = "󰉏 "
"Videos" = "󰕧 "
"Projects" = "󱂵 "
"work" = "󰑴 "
"src" = " "
"lib" = "󰆧 "
"test" = "🧪 "
"bin" = "󰲒 "
"include" = "󰅴 "
"venv" = "🐍 "
".git" = "󰊢 "
"node_modules" = " "
"target" = "🎯 "
"build" = "🏗️ "
"dist" = "📦 "
"public" = "🌐 "
"private" = "🔒 "
"config" = "⚙️ "
"scripts" = "📜 "
"data" = "📊 "
"assets" = "🎨 "
"docs" = "📚 "
"tests" = "🧪 "
"tools" = "🛠️ "
"internal" = "🔒 "
"pkg" = "📦 "
"cmd" = "󰘳 "
"api" = "🔌 "
"web" = "🕸️ "
[git_branch]
symbol = ""
style = "bg:nord_polar_night_2 fg:nord_aurora_green"
format = "[ $symbol $branch ]($style)"
[git_status]
style = "bg:nord_polar_night_2 fg:nord_aurora_red"
format = "[($all_status$ahead_behind )]($style)"
conflicted = "="
ahead = "⇡"
behind = "⇣"
diverged = "⇕"
untracked = "?"
stashed = "$"
modified = "!"
staged = "+"
renamed = "»"
deleted = "✘"
[git_state]
style = "bg:nord_polar_night_2 fg:nord_aurora_yellow"
format = "[ \\($state( $progress_current/$progress_total)\\) ]($style)"
[git_metrics]
added_style = "bold blue"
deleted_style = "bold red"
disabled = false
[git_commit]
commit_hash_length = 7
style = "bg:nord_polar_night_2 fg:nord_snow_storm_0"
format = "[ @$hash ]($style)"
