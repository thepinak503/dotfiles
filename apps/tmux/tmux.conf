# ============================================================================
# Tmux Supreme Configuration (Nord Theme)
# ============================================================================
# A comprehensive tmux configuration with Nord color scheme, vim-like
# navigation, mouse support, and sensible defaults for productivity.
# ============================================================================

# ----------------------------------------------------------------------------
#  SECTION 1: GENERAL SETTINGS
# ----------------------------------------------------------------------------

# Default terminal
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",xterm-256color:Tc"

# Mouse support
set -g mouse on

# Index starting at 1 (not 0)
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows when one is closed
set -g renumber-windows on

# History limit (10000 lines)
set -g history-limit 10000

# Set default shell
set -g default-command "${SHELL:-/bin/bash}"
set -g default-shell "${SHELL:-/bin/bash}"

# Escape time (fast)
set -sg escape-time 10

# Focus events enabled (for vim, git, etc.)
set -g focus-events on

# Set display time for messages
set -g display-time 2000
set -g display-panes-time 3000

# Set lock settings
set -g lock-after-time 0
set -g lock-command "vlock -a"

# Set visual bell
set -g visual-bell on
set -g bell-action any

# ----------------------------------------------------------------------------
#  SECTION 2: KEYBINDINGS
# ----------------------------------------------------------------------------

# Change prefix from C-b to C-a (like screen)
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Reload config
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded!"

# Splitting panes (with current directory)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind _ split-window -v -c "#{pane_current_path}"
bind \\ split-window -h -c "#{pane_current_path}"

# Splitting windows
bind C split-window -h -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# VI-style navigation
setw -g mode-keys vi

# Pane navigation (vim style)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Pane navigation (arrow keys)
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# Resize panes (vim style)
bind H resize-pane -L 5
bind J resize-pane -D 5
bind K resize-pane -U 5
bind L resize-pane -R 5

# Resize panes (ctrl + arrows)
bind -n M-S-Left resize-pane -L 5
bind -n M-S-Right resize-pane -R 5
bind -n M-S-Up resize-pane -U 5
bind -n M-S-Down resize-pane -D 5

# Zoom pane
bind z resize-pane -Z

# Toggle last active pane
bind Tab last-window
bind C-o last-window

# Swap panes
bind { swap-pane -U
bind } swap-pane -D

# Break pane to new window
bind ! break-pane

# Join pane to window
bind @ command-prompt -p "Join pane to window:" "join-pane -t '%%'"

# Rotate panes
bind C-n rotate-window
bind Space rotate-window

# Synchronize panes
bind S setw synchronize-panes \; display "Synchronize panes: #{?synchronize-panes,ON,OFF}"

# Window navigation
bind n next-window
bind p previous-window
bind 0 select-window -t 10
bind 1 select-window -t 1
bind 2 select-window -t 2
bind 3 select-window -t 3
bind 4 select-window -t 4
bind 5 select-window -t 5
bind 6 select-window -t 6
bind 7 select-window -t 7
bind 8 select-window -t 8
bind 9 select-window -t 9

# Move windows
bind -r M-n swap-window -d -t +1
bind -r M-p swap-window -d -t -1

# Kill pane/window
bind x kill-pane
bind X kill-window

# Copy mode (vi style)
bind Enter copy-mode
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi V send-keys -X select-line
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "xclip -sel c -i"
bind -T copy-mode-vi Y send-keys -X copy-pipe-and-cancel "xclip -sel c -i"
bind -T copy-mode-vi Escape send-keys -X cancel

# Paste from clipboard
bind p paste-buffer -p

# Save / restore buffers
bind P choose-buffer

# Clear history
bind C-l clear-history \; send-keys C-l

# ----------------------------------------------------------------------------
#  SECTION 3: STATUS BAR (Nord Theme)
# ----------------------------------------------------------------------------

# Status bar colors
set -g status-style bg="#2e3440",fg="#d8dee9"
set -g message-style bg="#88c0d0",fg="#2e3440"
set -g message-command-style bg="#88c0d0",fg="#2e3440"

# Pane border colors
set -g pane-border-style fg="#3b4252"
set -g pane-active-border-style fg="#88c0d0"

# Status bar position and interval
set -g status-position top
set -g status-interval 2
set -g status-justify centre

# Status left
set -g status-left "#[bg=#81a1c1,fg=#2e3440,bold] #S "
set -g status-left-length 40

# Status right
set -g status-right "#[fg=#d8dee9] %H:%M #[bg=#88c0d0,fg=#2e3440,bold] #H "
set -g status-right-length 80

# Window status styles
setw -g window-status-current-format "#[bg=#88c0d0,fg=#2e3440,bold] #I:#W "
setw -g window-status-format " #I:#W "
setw -g window-status-separator "|"
setw -g window-status-current-style bg="#88c0d0",fg="#2e3440",bold
setw -g window-status-style bg="#2e3440",fg="#d8dee9"
setw -g window-status-bell-style bg="#bf616a",fg="#2e3440",bold
setw -g window-status-activity-style bg="#ebcb8b",fg="#2e3440",bold

# ----------------------------------------------------------------------------
#  SECTION 4: PLUGINS (TPM)
# ----------------------------------------------------------------------------

# TPM plugin manager (install with: git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm)
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-prefix-highlight'
set -g @plugin 'tmux-plugins/tmux-copycat'
set -g @plugin 'tmux-plugins/tmux-fpp'

# Resurrect settings
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-vim 'session'
set -g @resurrect-strategy-nvim 'session'
set -g @resurrect-save-shell-history 'on'
set -g @resurrect-restore-pane-shell-history 'on'

# Continuum settings
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15' # save every 15 minutes

# Yank settings
set -g @yank-with-mouse 'on'
set -g @yank-selection-mouse 'clipboard'

# Prefix highlight settings
set -g @prefix_highlight_prefix_prompt ' C-a '
set -g @prefix_highlight_copy_mode_attr 'fg=#d8dee9,bg=#81a1c1,bold'
set -g @prefix_highlight_output_prefix '#[bg=#88c0d0,fg=#2e3440]'
set -g @prefix_highlight_output_suffix '#[bg=#2e3440,fg=#88c0d0]'
set -g @prefix_highlight_show_copy_mode 'on'

# Copycat settings
set -g @copycat-keep-trim-leading 'off'

# Initialize TPM (run this in tmux: prefix + I)
run '~/.tmux/plugins/tpm/tpm'

# ----------------------------------------------------------------------------
#  SECTION 5: CUSTOM SCRIPTS & HOOKS
# ----------------------------------------------------------------------------

# Automatically renumber windows when one is closed
set -g renumber-windows on

# Update environment when attaching
if "test -f ~/.tmux/.update_env.tmux" "source ~/.tmux/.update_env.tmux"

# Set default path for new windows/panes
bind '"' split-window -v -c "#{pane_current_path}"
bind '%' split-window -h -c "#{pane_current_path}"

# Easy config editing
bind e new-window -n '.tmux.conf' nvim ~/.config/tmux/tmux.conf

# ----------------------------------------------------------------------------
#  SECTION 6: ADVANCED FEATURES
# ----------------------------------------------------------------------------

# Enable true color support
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"
set -ga terminal-overrides '*:Ss=\E[%p1%d q:Se=\E[ q'
set-environment -g COLORTERM "truecolor"

# Fancy status line with dynamic content
set -g status-right "#[fg=#d8dee9]#(uptime -p | sed 's/up //' | sed 's/,//g' | sed 's/ hours/h/;s/ minutes/m/') #[fg=#eceff4]| #[fg=#d8dee9]%H:%M #[bg=#88c0d0,fg=#2e3440,bold] #h "

# Notification when shell command finishes
set -g @cursor-activity-command "notify-send -a tmux -u low 'Task complete' '#{pane_current_command} finished in session #{session_name}'"

# Set aggressive resize
setw -g aggressive-resize on

# Set remain-on-exit for debugging
set -g remain-on-exit off

# Set detach on destroy
set -g detach-on-destroy on

# Set set-titles (shows tmux in terminal title)
set -g set-titles on
set -g set-titles-string "#{session_name} - #{host}"

# ----------------------------------------------------------------------------
#  SECTION 7: FINAL SETTINGS
# ----------------------------------------------------------------------------

# Ensure the environment is clean
set -g update-environment "DISPLAY SSH_ASKPASS SSH_AUTH_SOCK SSH_AGENT_PID SSH_CONNECTION WINDOWID XDG_SESSION_ID XDG_VTNR XDG_SESSION_TYPE XDG_SESSION_CLASS XDG_SESSION_DESKTOP WAYLAND_DISPLAY"

# Set default command for new windows
bind c new-window -c "#{pane_current_path}"

# vim: ft=tmux
