# =============================================================================
# Tmux Supreme Configuration (Nord Theme)
# =============================================================================

# --- General ------------------------------------------------------------------
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",xterm-256color:Tc"
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g history-limit 10000

# --- Keybindings --------------------------------------------------------------
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Splitting
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# VI mode
setw -g mode-keys vi
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# --- Theme (Nord) -------------------------------------------------------------
set -g status-style bg="#2e3440",fg="#d8dee9"
set -g pane-border-style fg="#3b4252"
set -g pane-active-border-style fg="#88c0d0"
set -g status-left "#[bg=#81a1c1,fg=#2e3440,bold] #S "
set -g status-right "#[fg=#d8dee9] %H:%M #[bg=#88c0d0,fg=#2e3440,bold] #H "
setw -g window-status-current-format "#[bg=#88c0d0,fg=#2e3440,bold] #I:#W "
setw -g window-status-format " #I:#W "
