# =============================================================================
# HYRPPAPER — WALLPAPER DAEMON CONFIGURATION
# =============================================================================
# Preload wallpapers and assign them to monitors.
# Add new wallpapers with: hyprctl hyprpaper preload [path]
# Change wallpaper with: hyprctl hyprpaper wallpaper [monitor],[path]
# Reload config: pkill hyprpaper && hyprpaper
# =============================================================================

# Preload the current wallpaper (fetched by wallpaper-fetch script)
preload = $HOME/.local/share/dotfiles/wallpapers/fetch_1779699320.png

# Preload alternative wallpapers (fallbacks)
preload = $HOME/.local/share/dotfiles/wallpapers/fetch_1779699316.png

# Set wallpaper for all monitors (default)
wallpaper = , $HOME/.local/share/dotfiles/wallpapers/fetch_1779699320.png

# Per-monitor wallpaper assignment (uncomment if using multiple monitors)
# wallpaper = eDP-1, $HOME/.local/share/dotfiles/wallpapers/fetch_1779699320.png
# wallpaper = HDMI-A-1, $HOME/.local/share/dotfiles/wallpapers/fetch_1779699316.png
# wallpaper = DP-1, $HOME/.local/share/dotfiles/wallpapers/fetch_1779699316.png

# Enable splash text over wallpaper
splash = false

# Enable IPC for dynamic wallpaper changes
ipc = on

# =============================================================================
# USAGE GUIDE
# =============================================================================
# List monitors: hyprctl monitors
# Preload image:  hyprctl hyprpaper preload /path/to/image.png
# Set wallpaper:  hyprctl hyprpaper wallpaper "eDP-1,/path/to/image.png"
# Unload image:   hyprctl hyprpaper unload /path/to/image.png
# Unload unused:  hyprctl hyprpaper unload unused
# Reload daemon:  pkill hyprpaper && hyprpaper & disown
