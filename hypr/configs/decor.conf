# Appearance and decorations — Nord clean minimal
general {
  gaps_in = 4
  gaps_out = 6
  border_size = 2
  col.active_border = rgb(88c0d0) rgb(81a1c1) 45deg
  col.inactive_border = rgb(434c5e)
  layout = dwindle
  allow_tearing = true
  resize_corner = 2
}

cursor {
  inactive_timeout = 3
}

decoration {
  rounding = 8
  active_opacity = 1.0
  inactive_opacity = 0.92
  fullscreen_opacity = 1.0

  shadow {
    enabled = true
    range = 12
    render_power = 3
    color = rgba(0, 0, 0, 0.50)
    color_inactive = rgba(0, 0, 0, 0.30)
    offset = 2 4
    scale = 0.98
  }

  blur {
    enabled = true
    size = 6
    passes = 1
    new_optimizations = on
    ignore_opacity = false
    xray = true
    noise = 0
    contrast = 0.9
    brightness = 1.0
    popups = true
    popups_ignorealpha = 0.6
  }
}
