# Window rules — tag-based (Hyprland v0.53+)
# Tags group apps by category; opacity rules apply by tag

# --- Tag definitions ---
windowrule = match:class (firefox|google-chrome|chromium|brave|thorium|zen-beta), tag +browser
windowrule = match:class (kitty|alacritty|foot), tag +terminal
windowrule = match:class (code-oss|code|zed|jetbrains-.*), tag +projects
windowrule = match:class (discord|ferdium|whatsapp|telegram|element|webcord), tag +im
windowrule = match:class (thunar|nautilus|pcmanfm|nemo), tag +filemanager
windowrule = match:class (mpv|vlc|audacious), tag +media
windowrule = match:class (pavucontrol|blueman-manager|nm-connection-editor|gnome-control-center|qt5ct|qt6ct|nwg-look), tag +settings

# --- Opacity by tag ---
windowrule = match:tag terminal, opacity 0.92 0.80
windowrule = match:tag browser, opacity 0.98 0.85
windowrule = match:tag projects, opacity 0.95 0.82
windowrule = match:tag im, opacity 0.95 0.86
windowrule = match:tag filemanager, opacity 0.93 0.80
windowrule = match:tag media, opacity 0.95 0.82
windowrule = match:tag settings, float on, center on, size "60% 60%"

# --- App-specific rules ---
windowrule = match:class pavucontrol, float on, center on, size "60% 60%"
windowrule = match:class blueman-manager, float on
windowrule = match:class xdg-desktop-portal, float on
windowrule = match:title "^(Picture-in-Picture)$", float on, pin on, opacity 0.95 0.75, size "30% 30%", move "72% 7%"
windowrule = match:class rofi, no_shadow on
windowrule = match:class Rofi, no_shadow on
windowrule = match:class xwaylandvideobridge, opacity 0.0 override 0.0 override, no_anim on, max_size "1 1"
windowrule = match:class waybar, no_shadow on, no_focus on, no_initial_focus on, stay_focused on
windowrule = match:class Waybar, no_shadow on, no_focus on, no_initial_focus on, stay_focused on

# --- Global rules ---
windowrule = match:fullscreen true, idle_inhibit fullscreen
