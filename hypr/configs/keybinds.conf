$mainMod = SUPER

# ====================
# Launch Applications
# ====================
bind = $mainMod, Return, exec, kitty
bind = $mainMod, D, exec, rofi -show drun
bind = $mainMod, Space, exec, rofi -show drun -config /home/pinak/.config/rofi/config-full.rasi
bind = CTRL SHIFT, Escape, exec, kitty btop
bind = $mainMod, Tab, exec, rofi -show window -config /home/pinak/.config/rofi/config-full.rasi
bind = $mainMod, E, exec, nautilus
bind = $mainMod, B, exec, firefox
bind = $mainMod, period, exec, rofi -show emoji

# ====================
# Window Management
# ====================
bind = $mainMod, Q, killactive,
bind = $mainMod, Escape, exec, wlogout --protocol layer-shell
bind = $mainMod, F, fullscreen
bind = $mainMod, V, togglefloating,
bind = $mainMod, P, pseudo,
bind = $mainMod, S, layoutmsg, togglesplit

# Window groups
bind = $mainMod, G, togglegroup,
bind = $mainMod SHIFT, Tab, changegroupactive, forward
bind = $mainMod CTRL, Tab, changegroupactive, backward
bind = $mainMod SHIFT, G, lockactivegroup, toggle
bind = $mainMod CTRL, G, moveintogroup, forward
bind = $mainMod CTRL SHIFT, G, moveoutofgroup,

# ====================
# Focus
# ====================
bind = $mainMod, H, movefocus, l
bind = $mainMod, L, movefocus, r
bind = $mainMod, K, movefocus, u
bind = $mainMod, J, movefocus, d

# ====================
# ====================
# Move windows
# ====================
bind = $mainMod ALT, H, movewindow, l
bind = $mainMod ALT, L, movewindow, r
bind = $mainMod ALT, K, movewindow, u
bind = $mainMod ALT, J, movewindow, d

# Swap windows
bind = $mainMod ALT SHIFT, H, swapwindow, l
bind = $mainMod ALT SHIFT, L, swapwindow, r
bind = $mainMod ALT SHIFT, K, swapwindow, u
bind = $mainMod ALT SHIFT, J, swapwindow, d

# Help
bind = $mainMod SHIFT, H, exec, ~/.local/share/dotfiles/hypr/scripts/keyhints

# ====================
# Mouse: move & resize
# ====================
bind = $mainMod, mouse:272, movewindow
bind = $mainMod SHIFT, mouse:272, resizeactive

# ====================
# Resize windows (keyboard)
# ====================
bind = $mainMod, left, resizeactive, -30 0
bind = $mainMod, right, resizeactive, 30 0
bind = $mainMod, up, resizeactive, 0 -30
bind = $mainMod, down, resizeactive, 0 30

# ====================
# Workspace switching
# ====================
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9

# Move to workspace
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9

# Cycle workspaces
bind = $mainMod, mouse_up, workspace, e+1
bind = $mainMod, mouse_down, workspace, e-1
bind = $mainMod SHIFT, right, workspace, r+1
bind = $mainMod SHIFT, left, workspace, r-1
bind = $mainMod CTRL, right, workspace, +1
bind = $mainMod CTRL, left, workspace, -1
bind = $mainMod SHIFT, bracketright, movetoworkspace, +1
bind = $mainMod SHIFT, bracketleft, movetoworkspace, -1

# ====================
# Scratchpad
# ====================
bind = $mainMod, grave, togglespecialworkspace, magic
bind = $mainMod SHIFT, grave, movetoworkspace, special:magic

# ====================
# Screenshots
# ====================
bind =       , Print,      exec, hyprshot -m output
bind = SHIFT, Print,      exec, hyprshot -m region
bind = CTRL, Print,      exec, hyprshot -m window
bind = $mainMod SHIFT, S, exec, hyprshot -m region
bind = $mainMod CTRL, S, exec, hyprshot -m region --clipboard-only

# ====================
# Screen Recording
# ====================
bind = $mainMod SHIFT, Print, exec, ~/.local/share/dotfiles/hypr/scripts/screenrecord

# ====================
# Layout
# ====================
bind = $mainMod SHIFT, L, exec, ~/.local/share/dotfiles/hypr/scripts/changeLayout

# ====================
# Touchpad toggle
# ====================
bind = $mainMod, T, exec, ~/.local/share/dotfiles/hypr/scripts/touchpad

# ====================
# Color picker
# ====================
bind = $mainMod SHIFT, C, exec, hyprpicker -a

# ====================
# Game Mode
# ====================
bind = $mainMod SHIFT, G, exec, ~/.local/share/dotfiles/hypr/scripts/gamemode

# ====================
# Keyhints
# ====================
bind = $mainMod, slash, exec, ~/.local/share/dotfiles/hypr/scripts/keyhints

# ====================
# Media keys
# ====================
bindel = , XF86AudioRaiseVolume, exec, ~/.local/share/dotfiles/hypr/scripts/volume --inc
bindel = , XF86AudioLowerVolume, exec, ~/.local/share/dotfiles/hypr/scripts/volume --dec
bindl = , XF86AudioMute, exec, ~/.local/share/dotfiles/hypr/scripts/volume --toggle
bindel = , XF86MonBrightnessUp, exec, ~/.local/share/dotfiles/hypr/scripts/brightness --inc
bindel = , XF86MonBrightnessDown, exec, ~/.local/share/dotfiles/hypr/scripts/brightness --dec
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPrev, exec, playerctl previous

# ====================
# Lock & Logout
# ====================
bind = $mainMod CTRL, L, exec, hyprlock
bind = $mainMod CTRL, Q, exec, hyprctl dispatch exit

# ====================
# Reload config
# ====================
bind = $mainMod SHIFT, R, exec, hyprctl reload

# ====================
# Wallpapers
# ====================
bind = $mainMod, W, exec, ~/.local/share/dotfiles/hypr/scripts/wallpaper-fetch
bind = $mainMod SHIFT, W, exec, hyprctl hyprpaper wallpaper ",$(find /home/pinak/.local/share/dotfiles/wallpapers -type f | shuf -n 1)"

# ====================
# Clipboard
# ====================
bind = $mainMod SHIFT, V, exec, cliphist list | rofi -dmenu | cliphist decode | wl-copy
