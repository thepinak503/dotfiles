# =============================================================================
# HYPRIDLE — IDLE MANAGEMENT DAEMON
# =============================================================================
# Manages screen locking, DPMS, and suspend on idle.
# All timeouts are in seconds.
# =============================================================================

general {
  # Lock command - runs when idle timer triggers lock
  lock_cmd = pidof hyprlock || hyprlock
  # Unlock command - runs when user becomes active
  unlock_cmd = pkill -USR1 hyprlock
  # Command to run before system sleep
  before_sleep_cmd = loginctl lock-session
  # Command to run after system wakes
  after_sleep_cmd = hyprctl dispatch dpms on
  # Ignore dbus events while running (avoids double-triggering)
  ignore_dbus_events = false
}

# =============================================================================
# LISTENER STAGES
# =============================================================================
# Each listener defines a timeout and the actions to take when the timeout
# is reached (on-timeout) and when the user becomes active again (on-resume).

# Stage 1: Dim brightness to 10% after 5 minutes (300s)
listener {
  timeout = 300
  on-timeout = brightnessctl -s set 10
  on-resume = brightnessctl -r
}

# Stage 2: Notify before locking (after 5 minutes 30 seconds)
listener {
  timeout = 330
  on-timeout = notify-send -u critical -t 5000 "System" "Locking screen in 30 seconds..."
  on-resume = notify-send -u normal -t 3000 "System" "Welcome back!"
}

# Stage 3: Lock screen after 10 minutes (600s)
listener {
  timeout = 600
  on-timeout = loginctl lock-session
}

# Stage 4: Turn off display after 12 minutes (720s) — only if already locked
listener {
  timeout = 720
  on-timeout = hyprctl dispatch dpms off
  on-resume = hyprctl dispatch dpms on
}

# Stage 5: Suspend to RAM after 30 minutes (1800s)
listener {
  timeout = 1800
  on-timeout = systemctl suspend
}

# Stage 6: Media pause on idle (optional, requires playerctl)
listener {
  timeout = 240
  on-timeout = playerctl pause
}

# =============================================================================
# POWER MANAGEMENT NOTES
# =============================================================================
# If you're having issues with DPMS:
#   - Ensure hypridle is running: systemctl --user enable hypridle
#   - Test manually: hyprctl dispatch dpms off
#   - Check for other idle inhibitors (video players, browsers)
