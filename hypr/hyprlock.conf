# =============================================================================
# HYPRLOCK — LOCK SCREEN CONFIGURATION
# =============================================================================
# General settings and global defaults
# =============================================================================

general {
  hide_cursor = false
  no_fade_in = false
  no_fade_out = false
  # Enables the CSD (Client-Side Decorations) on Wayland
  allow_dpms = false
  # Fade time in ms
  fade_time = 250
  # Pulse width for the fade animation
  fade_pulse = 0.05
  # Draw the user's current wallpaper as the lock screen background
  disable_loading_bar = true
  # Disable the loading bar at the bottom
  ignore_empty_input = true
  # Ignore empty input buffer (won't show "no input" state)
  # Reset input after successful authentication
  reset_on_input = true
}

# =============================================================================
# BACKGROUND CONFIGURATION
# =============================================================================
# Multiple backgrounds can be stacked (first is topmost).
# If no monitor is specified, the background applies to all monitors.

background {
  monitor =
  path = screenshot
  # Or use a solid color:
  # color = rgb(2e3440)
  blur_passes = 3
  blur_size = 8
  noise = 0.0117
  contrast = 0.8916
  brightness = 0.8172
  vibrancy = 0.1696
  vibrancy_darkness = 0.0
}

# =============================================================================
# CLOCK LABELS
# =============================================================================

# Large time display (HH:MM)
label {
  monitor =
  text = cmd[update:1000] date '+%H:%M'
  font_size = 96
  font_family = JetBrains Mono Nerd Font
  color = rgb(eceff4)
  shadow_color = rgb(000000)
  shadow_size = 3
  shadow_passes = 3
  position = 0, 120
  halign = center
  valign = center
}

# Date display (Day, Month Date, Year)
label {
  monitor =
  text = cmd[update:60000] date '+%A, %B %d, %Y'
  font_size = 22
  font_family = JetBrains Mono Nerd Font
  color = rgb(88c0d0)
  shadow_color = rgb(000000)
  shadow_size = 2
  shadow_passes = 2
  position = 0, 30
  halign = center
  valign = center
}

# =============================================================================
# INPUT FIELD (PASSWORD)
# =============================================================================

input-field {
  monitor =
  size = 300, 60
  outline_thickness = 3
  dots_size = 0.25
  dots_spacing = 0.45
  dots_center = true
  dots_count = 0
  outer_color = rgb(88c0d0)
  inner_color = rgb(2e3440)
  font_color = rgb(d8dee9)
  font_family = JetBrains Mono Nerd Font
  fade_on_empty = true
  fade_timeout = 2000
  placeholder_text = <i>  Password...</i>
  hide_input = true
  check_color = rgb(a3be8c)
  fail_color = rgb(bf616a)
  fail_text = <b>  INCORRECT</b>
  fail_timeout = 2000
  position = 0, -40
  halign = center
  valign = center
}

# =============================================================================
# SYSTEM STATUS LABELS
# =============================================================================

# CPU Info
label {
  monitor =
  text = cmd[update:5000] echo " $(top -bn1 | grep 'Cpu(s)' | awk '{print $2}')% CPU"
  font_size = 14
  font_family = JetBrains Mono Nerd Font
  color = rgb(a3be8c)
  position = 30, -30
  halign = left
  valign = bottom
}

# Memory Info
label {
  monitor =
  text = cmd[update:5000] echo " $(free -h | awk '/^Mem:/ {print $3}' | sed 's/i//g') MEM"
  font_size = 14
  font_family = JetBrains Mono Nerd Font
  color = rgb(81a1c1)
  position = 30, -50
  halign = left
  valign = bottom
}

# Uptime Info
label {
  monitor =
  text = cmd[update:60000] echo " $(uptime -p | sed 's/up //')"
  font_size = 14
  font_family = JetBrains Mono Nerd Font
  color = rgb(ebcb8b)
  position = 30, -70
  halign = left
  valign = bottom
}

# =============================================================================
# USER GREETING
# =============================================================================

label {
  monitor =
  text = cmd[update:0] echo "Welcome back, $(whoami)!"
  font_size = 18
  font_family = JetBrains Mono Nerd Font
  color = rgb(d8dee9)
  position = 0, -100
  halign = center
  valign = center
}

# =============================================================================
# SECONDARY MONITOR (if applicable)
# =============================================================================
# Simpler lock screen for secondary monitors

label {
  monitor = 1
  text = cmd[update:1000] date '+%H:%M'
  font_size = 48
  font_family = JetBrains Mono Nerd Font
  color = rgb(eceff4)
  position = 0, 20
  halign = center
  valign = center
}

input-field {
  monitor = 1
  size = 260, 50
  outline_thickness = 2
  dots_size = 0.2
  dots_spacing = 0.4
  dots_center = true
  outer_color = rgb(88c0d0)
  inner_color = rgb(2e3440)
  font_color = rgb(d8dee9)
  fade_on_empty = true
  placeholder_text = <i>  unlock...</i>
  hide_input = true
  check_color = rgb(a3be8c)
  fail_color = rgb(bf616a)
  position = 0, -30
  halign = center
  valign = center
}

# =============================================================================
# CURRENT TIME LABEL (24-hour format)
# =============================================================================

label {
  monitor =
  text = cmd[update:1000] date '+%I:%M %p'
  font_size = 16
  font_family = JetBrains Mono Nerd Font
  color = rgb(8fbcbb)
  position = -30, -30
  halign = right
  valign = bottom
}

# =============================================================================
# SESSION INFO
# =============================================================================

label {
  monitor =
  text = Hyprland
  font_size = 12
  font_family = JetBrains Mono Nerd Font
  color = rgb(4c566a)
  position = -30, -50
  halign = right
  valign = bottom
}
