# Hyprlock — Nord lock screen
background {
  monitor =
  path = screenshot
  blur_passes = 3
  blur_size = 8
  noise = 0.01
  contrast = 0.8
  brightness = 0.6
  vibrancy = 0.4
  vibrancy_darkness = 0.2
}

input-field {
  monitor =
  size = 250, 50
  outline_thickness = 2
  dots_size = 0.2
  dots_spacing = 0.4
  dots_center = true
  outer_color = rgb(81a1c1)
  inner_color = rgb(2e3440)
  font_color = rgb(d8dee9)
  fade_on_empty = true
  placeholder_text = <i>unlock...</i>
  hide_input = false
  position = 0, -40
  halign = center
  valign = center
}

label {
  monitor =
  text = $TIME
  font_size = 48
  font_family = JetBrains Mono Nerd Font
  color = rgb(d8dee9)
  position = 0, 40
  halign = center
  valign = center
}

label {
  monitor =
  text = cmd[update:60000] date '+%A, %B %d, %Y'
  font_size = 16
  font_family = JetBrains Mono Nerd Font
  color = rgb(81a1c1)
  position = 0, 0
  halign = center
  valign = center
}
