general {
  hide_cursor = false
  no_fade_in = false
  no_fade_out = false
  allow_dpms = false
  fade_time = 250
  fade_pulse = 0.05
  disable_loading_bar = true
  ignore_empty_input = true
  reset_on_input = true
}

background {
  monitor =
  path = screenshot
  blur_passes = 3
  blur_size = 8
  noise = 0.0117
  contrast = 0.8916
  brightness = 0.8172
  vibrancy = 0.1696
  vibrancy_darkness = 0.0
}

label {
  monitor =
  text = cmd[update:1000] date '+%H:%M'
  font_size = 96
  font_family = CaskaydiaCove Nerd Font
  color = rgb(3b4252)
  shadow_color = rgb(ffffff)
  shadow_size = 2
  shadow_passes = 2
  position = 0, 120
  halign = center
  valign = center
}

label {
  monitor =
  text = cmd[update:60000] date '+%A, %B %d, %Y'
  font_size = 22
  font_family = CaskaydiaCove Nerd Font
  color = rgb(5e81ac)
  shadow_color = rgb(ffffff)
  shadow_size = 1
  shadow_passes = 1
  position = 0, 30
  halign = center
  valign = center
}

input-field {
  monitor =
  size = 300, 60
  outline_thickness = 3
  dots_size = 0.25
  dots_spacing = 0.45
  dots_center = true
  dots_count = 0
  outer_color = rgb(5e81ac)
  inner_color = rgb(eceff4)
  font_color = rgb(2e3440)
  font_family = CaskaydiaCove Nerd Font
  fade_on_empty = true
  fade_timeout = 2000
  placeholder_text = <i>  Password...</i>
  hide_input = true
  check_color = rgb(a3be8c)
  fail_color = rgb(bf616a)
  fail_text = <b>  INCORRECT</b>
  fail_timeout = 2000
  position = 0, -40
  halign = center
  valign = center
}

label {
  monitor =
  text = cmd[update:5000] echo " $(top -bn1 | grep 'Cpu(s)' | awk '{print $2}')% CPU"
  font_size = 14
  font_family = CaskaydiaCove Nerd Font
  color = rgb(a3be8c)
  position = 30, -30
  halign = left
  valign = bottom
}

label {
  monitor =
  text = cmd[update:5000] echo " $(free -h | awk '/^Mem:/ {print $3}' | sed 's/i//g') MEM"
  font_size = 14
  font_family = CaskaydiaCove Nerd Font
  color = rgb(81a1c1)
  position = 30, -50
  halign = left
  valign = bottom
}

label {
  monitor =
  text = cmd[update:60000] echo " $(uptime -p | sed 's/up //')"
  font_size = 14
  font_family = CaskaydiaCove Nerd Font
  color = rgb(ebcb8b)
  position = 30, -70
  halign = left
  valign = bottom
}

label {
  monitor =
  text = cmd[update:0] echo "Welcome back, $(whoami)!"
  font_size = 18
  font_family = CaskaydiaCove Nerd Font
  color = rgb(2e3440)
  position = 0, -100
  halign = center
  valign = center
}

label {
  monitor = 1
  text = cmd[update:1000] date '+%H:%M'
  font_size = 48
  font_family = CaskaydiaCove Nerd Font
  color = rgb(3b4252)
  position = 0, 20
  halign = center
  valign = center
}

input-field {
  monitor = 1
  size = 260, 50
  outline_thickness = 2
  dots_size = 0.2
  dots_spacing = 0.4
  dots_center = true
  outer_color = rgb(5e81ac)
  inner_color = rgb(eceff4)
  font_color = rgb(2e3440)
  fade_on_empty = true
  placeholder_text = <i>  unlock...</i>
  hide_input = true
  check_color = rgb(a3be8c)
  fail_color = rgb(bf616a)
  position = 0, -30
  halign = center
  valign = center
}

label {
  monitor =
  text = cmd[update:1000] date '+%I:%M %p'
  font_size = 16
  font_family = CaskaydiaCove Nerd Font
  color = rgb(8fbcbb)
  position = -30, -30
  halign = right
  valign = bottom
}

label {
  monitor =
  text = Hyprland
  font_size = 12
  font_family = CaskaydiaCove Nerd Font
  color = rgb(b6beca)
  position = -30, -50
  halign = right
  valign = bottom
}
