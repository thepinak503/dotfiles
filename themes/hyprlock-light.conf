background {
  monitor =
  color = rgb(eceff4)
}

input-field {
  monitor =
  size = 280, 55
  outline_thickness = 2
  dots_size = 0.25
  dots_spacing = 0.45
  dots_center = true
  outer_color = rgb(5e81ac)
  inner_color = rgb(eceff4)
  font_color = rgb(2e3440)
  fade_on_empty = true
  placeholder_text = <i>  unlock...</i>
  hide_input = false
  position = 0, 80
  halign = center
  valign = center
}

label {
  monitor =
  text = $TIME
  font_size = 64
  font_family = CaskaydiaCove Nerd Font
  color = rgb(3b4252)
  position = 0, 0
  halign = center
  valign = center
}

label {
  monitor =
  text = cmd[update:60000] date '+%A, %B %d, %Y'
  font_size = 20
  font_family = CaskaydiaCove Nerd Font
  color = rgb(5e81ac)
  position = 0, -50
  halign = center
  valign = center
}
